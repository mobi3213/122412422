<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Команды — Well Played</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238b5cf6'/><text x='50' y='72' font-size='50' text-anchor='middle' fill='white' font-weight='bold' font-family='Arial, sans-serif'>WP</text></svg>">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #090d18; color: white; overflow-x: hidden; }
    .bg-glow { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(138,92,246,0.35), transparent 70%); top: -200px; right: -150px; z-index: 0; pointer-events: none; }
    .bg-glow2 { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(43,210,255,0.25), transparent 70%); bottom: -200px; left: -150px; z-index: 0; pointer-events: none; }
    header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); background: rgba(9,13,24,0.75); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .container { width: min(1200px, 92%); margin: auto; position: relative; z-index: 2; padding: 40px 0; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .logo-image { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; display: block; }
    .logo h1 { font-size: 26px; font-weight: 800; }
    .logo p { font-size: 12px; color: rgba(255,255,255,0.5); }
    nav ul { display: flex; gap: 34px; list-style: none; }
    nav a { color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.2s; cursor: pointer; }
    nav a:hover, nav a.active { color: white; background: linear-gradient(135deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn { border: none; padding: 14px 24px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.25s; font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #22d3ee); color: white; }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: white; text-decoration: none; display: inline-block; }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .page-header { margin-bottom: 40px; }
    .page-header h1 { font-size: 48px; margin-bottom: 16px; background: linear-gradient(135deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .teams-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 20px; }
    .team-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 24px; transition: 0.25s; }
    .team-card:hover { transform: translateY(-4px); border-color: rgba(139,92,246,0.4); }
    .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .team-name { font-size: 24px; font-weight: 700; }
    .team-game { background: rgba(34,211,238,0.12); color: #67e8f9; padding: 6px 12px; border-radius: 12px; font-size: 13px; }
    .team-members { display: flex; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
    .team-member { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 8px 12px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .team-stats { display: flex; gap: 20px; margin: 16px 0; color: rgba(255,255,255,0.6); font-size: 14px; }
    .empty-teams { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); grid-column: span 2; }
    footer { border-top: 1px solid rgba(255,255,255,0.08); padding: 32px 0; margin-top: 60px; }
    .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: rgba(255,255,255,0.55); text-decoration: none; cursor: pointer; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; border: 1px solid rgba(34,211,238,0.5); border-radius: 16px; padding: 14px 24px; color: white; z-index: 1001; transform: translateX(400px); transition: 0.3s; backdrop-filter: blur(10px); }
    .toast.show { transform: translateX(0); }
    @media (max-width: 800px) { .teams-grid { grid-template-columns: 1fr; } nav ul { display: none; } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
  <div id="toast" class="toast"></div>

  <header>
    <div class="container nav">
      <div class="logo" onclick="window.location.href='index.html'">
        <img src="logo.png" alt="Logo" class="logo-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%238b5cf6%22/><text x=%2250%22 y=%2272%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 font-weight=%22bold%22>WP</text></svg>'">
        <div><h1>well played</h1><p>find your perfect teammates</p></div>
      </div>
      <nav>
        <ul>
          <li><a href="games.html">Игры</a></li>
          <li><a href="teams.html" class="active">Команды</a></li>
          <li><a href="rating.html">Рейтинг</a></li>
          <li><a href="community.html">Сообщество</a></li>
        </ul>
      </nav>
      <div class="auth-buttons" id="authButtons">
        <button class="btn btn-secondary" onclick="openLoginModal()">Войти</button>
        <button class="btn btn-primary" onclick="openRegisterModal()">Регистрация</button>
      </div>
      <div class="user-info" id="userInfo" style="display: none;">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
        <button class="btn btn-secondary logout-btn" onclick="logout()">Выйти</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1>Команды</h1>
      <p>Все команды, созданные игроками</p>
    </div>
    <div class="teams-grid" id="teamsList"></div>
  </main>

  <footer>
    <div class="container footer-content">
      <div>© 2026 well played</div>
      <div class="footer-links">
        <a onclick="showToast('📢 Discord — скоро')">Discord</a>
        <a onclick="showToast('🎮 Steam — скоро')">Steam</a>
        <a onclick="showToast('📱 VK — скоро')">VK</a>
      </div>
    </div>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDBAZ2887ekcEGUcb9gTh2mwRLkrYDLqUE",
      authDomain: "well-played-app.firebaseapp.com",
      databaseURL: "https://well-played-app-default-rtdb.firebaseio.com",
      projectId: "well-played-app",
      storageBucket: "well-played-app.firebasestorage.app",
      messagingSenderId: "926709321013",
      appId: "1:926709321013:web:b90a53e2a4e0e9a228507c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function renderTeams() {
      const teamsList = document.getElementById('teamsList');
      const teamsSnapshot = await database.ref('teams').once('value');
      const teams = teamsSnapshot.val();
      
      if (!teams) {
        teamsList.innerHTML = '<div class="empty-teams">😢 Пока нет созданных команд<br><button class="btn btn-primary" style="margin-top: 16px;" onclick="window.location.href=\'index.html\'">Найти тиммейтов</button></div>';
        return;
      }
      
      // Получаем уникальные команды (по leader)
      const uniqueTeams = {};
      for (const [userId, team] of Object.entries(teams)) {
        if (team.leader && (!uniqueTeams[team.leader] || uniqueTeams[team.leader].members.length < team.members.length)) {
          uniqueTeams[team.leader] = team;
        }
      }
      
      const teamsArray = Object.values(uniqueTeams).filter(t => t.members && t.members.length > 1);
      
      if (teamsArray.length === 0) {
        teamsList.innerHTML = '<div class="empty-teams">😢 Пока нет созданных команд<br><button class="btn btn-primary" style="margin-top: 16px;" onclick="window.location.href=\'index.html\'">Найти тиммейтов</button></div>';
        return;
      }
      
      let html = '';
      for (const team of teamsArray) {
        const membersData = [];
        for (const memberId of team.members) {
          const userSnapshot = await database.ref('users/' + memberId).once('value');
          if (userSnapshot.exists()) {
            membersData.push({ id: memberId, ...userSnapshot.val() });
          }
        }
        const leaderData = membersData.find(m => m.id === team.leader);
        const game = membersData[0]?.favoriteGame || 'Разные игры';
        
        html += `
          <div class="team-card">
            <div class="team-header">
              <span class="team-name">${escapeHtml(leaderData?.username || 'Команда')}</span>
              <span class="team-game">${escapeHtml(game)}</span>
            </div>
            <div class="team-members">
              ${membersData.map(m => `<div class="team-member">${m.id === team.leader ? '👑' : '👤'} ${escapeHtml(m.username)}</div>`).join('')}
            </div>
            <div class="team-stats">
              <div>👥 ${membersData.length} участников</div>
            </div>
          </div>
        `;
      }
      teamsList.innerHTML = html;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      await renderTeams();
    });
    
    renderTeams();
  </script>
</body>
</html>
