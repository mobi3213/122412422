<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рейтинг — Well Played</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238b5cf6'/><text x='50' y='72' font-size='50' text-anchor='middle' fill='white' font-weight='bold' font-family='Arial, sans-serif'>WP</text></svg>">
  
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #090d18; color: white; }
    .bg-glow, .bg-glow2 { position: fixed; width: 600px; height: 600px; border-radius: 50%; z-index: 0; pointer-events: none; }
    .bg-glow { background: radial-gradient(circle, rgba(138,92,246,0.35), transparent 70%); top: -200px; right: -150px; }
    .bg-glow2 { background: radial-gradient(circle, rgba(43,210,255,0.25), transparent 70%); bottom: -200px; left: -150px; }
    header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); background: rgba(9,13,24,0.75); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .container { width: min(1200px, 92%); margin: auto; position: relative; z-index: 2; padding: 40px 0; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .logo-image { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
    .logo h1 { font-size: 26px; font-weight: 800; }
    .logo p { font-size: 12px; color: rgba(255,255,255,0.5); }
    nav ul { display: flex; gap: 34px; list-style: none; }
    nav a { color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.2s; }
    nav a:hover, nav a.active { color: white; background: linear-gradient(135deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn { border: none; padding: 14px 24px; border-radius: 16px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #22d3ee); color: white; }
    .page-header h1 { font-size: 48px; margin-bottom: 16px; background: linear-gradient(135deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .rating-table { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; overflow: hidden; }
    .rating-row { display: flex; align-items: center; padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .rating-row.header { background: rgba(139,92,246,0.1); font-weight: 600; }
    .rank { width: 80px; font-weight: 700; font-size: 20px; }
    .rank.gold { color: #ffd700; }
    .rank.silver { color: #c0c0c0; }
    .rank.bronze { color: #cd7f32; }
    .player { flex: 2; display: flex; align-items: center; gap: 12px; }
    .player-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #22d3ee); display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .rating-score { width: 100px; text-align: center; font-weight: 700; color: #c4b5fd; }
    .wins { width: 100px; text-align: center; }
    .empty-rating { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); }
    footer { border-top: 1px solid rgba(255,255,255,0.08); padding: 32px 0; margin-top: 60px; }
    .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    @media (max-width: 800px) { .rating-row { flex-wrap: wrap; gap: 12px; } .rank, .player, .rating-score, .wins { width: 100%; text-align: left; } nav ul { display: none; } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <header>
    <div class="container nav">
      <div class="logo" onclick="window.location.href='index.html'">
        <img src="logo.png" alt="Logo" class="logo-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%238b5cf6%22/><text x=%2250%22 y=%2272%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 font-weight=%22bold%22>WP</text></svg>'">
        <div><h1>well played</h1><p>find your perfect teammates</p></div>
      </div>
      <nav>
        <ul>
          <li><a href="games.html">Игры</a></li>
          <li><a href="teams.html">Команды</a></li>
          <li><a href="rating.html" class="active">Рейтинг</a></li>
          <li><a href="community.html">Сообщество</a></li>
        </ul>
      </nav>
      <button class="btn btn-primary" onclick="window.location.href='index.html'">На главную</button>
    </div>
  </header>

  <main class="container">
    <div class="page-header"><h1>Рейтинг игроков</h1></div>
    <div class="rating-table" id="ratingTable"></div>
  </main>

  <footer><div class="container footer-content"><div>© 2026 well played</div></div></footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDBAZ2887ekcEGUcb9gTh2mwRLkrYDLqUE",
      authDomain: "well-played-app.firebaseapp.com",
      databaseURL: "https://well-played-app-default-rtdb.firebaseio.com",
      projectId: "well-played-app",
      storageBucket: "well-played-app.firebasestorage.app",
      messagingSenderId: "926709321013",
      appId: "1:926709321013:web:b90a53e2a4e0e9a228507c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    async function renderRating() {
      const snapshot = await database.ref('users').once('value');
      const users = snapshot.val();
      if (!users) {
        document.getElementById('ratingTable').innerHTML = '<div class="empty-rating">😢 Нет зарегистрированных пользователей</div>';
        return;
      }
      const usersArray = Object.entries(users).map(([id, data]) => ({ id, ...data }));
      // Сортируем по репутации (рейтингу)
      usersArray.sort((a,b) => (b.reputation || 0) - (a.reputation || 0));
      
      let html = `<div class="rating-row header"><div class="rank">#</div><div class="player">Игрок</div><div class="rating-score">Рейтинг</div><div class="wins">Игра</div></div>`;
      usersArray.forEach((user, index) => {
        let rankClass = '';
        let rankIcon = '';
        if (index === 0) { rankClass = 'gold'; rankIcon = '🏆 '; }
        else if (index === 1) { rankClass = 'silver'; rankIcon = '🥈 '; }
        else if (index === 2) { rankClass = 'bronze'; rankIcon = '🥉 '; }
        else { rankIcon = `${index+1} `; }
        
        html += `
          <div class="rating-row">
            <div class="rank ${rankClass}">${rankIcon}${index+1}</div>
            <div class="player">
              <div class="player-avatar">${escapeHtml(user.username?.charAt(0) || 'U')}</div>
              <div>${escapeHtml(user.username)}</div>
            </div>
            <div class="rating-score">${user.reputation || 1000}</div>
            <div class="wins">${escapeHtml(user.favoriteGame || '—')}</div>
          </div>
        `;
      });
      document.getElementById('ratingTable').innerHTML = html;
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    renderRating();
  </script>
</body>
</html>
