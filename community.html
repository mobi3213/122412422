<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сообщество — Well Played</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238b5cf6'/><text x='50' y='72' font-size='50' text-anchor='middle' fill='white' font-weight='bold' font-family='Arial, sans-serif'>WP</text></svg>">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #090d18; color: white; overflow-x: hidden; }
    .bg-glow { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(138,92,246,0.35), transparent 70%); top: -200px; right: -150px; z-index: 0; pointer-events: none; }
    .bg-glow2 { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(43,210,255,0.25), transparent 70%); bottom: -200px; left: -150px; z-index: 0; pointer-events: none; }
    header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); background: rgba(9,13,24,0.75); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .container { width: min(1200px, 92%); margin: auto; position: relative; z-index: 2; padding: 40px 0; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 22px 0; flex-wrap: wrap; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .logo-image { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; display: block; }
    .logo h1 { font-size: 26px; font-weight: 800; }
    .logo p { font-size: 12px; color: rgba(255,255,255,0.5); }
    nav ul { display: flex; gap: 34px; list-style: none; }
    nav a { color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.2s; cursor: pointer; }
    nav a:hover, nav a.active { color: white; background: linear-gradient(135deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn { border: none; padding: 14px 24px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.25s; font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, #8b5cf6, #22d3ee); color: white; }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: white; }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
    .page-header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .page-header h1 { font-size: 48px; background: linear-gradient(135deg, #8b5cf6, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* Create post */
    .create-post { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 24px; margin-bottom: 30px; }
    .create-post textarea { width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: 'Inter', sans-serif; font-size: 14px; resize: vertical; margin-bottom: 16px; }
    .create-post textarea:focus { outline: none; border-color: #8b5cf6; }
    
    /* Posts */
    .post-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 24px; margin-bottom: 24px; transition: 0.25s; }
    .post-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    .post-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #22d3ee); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
    .post-author { font-weight: 600; font-size: 16px; }
    .post-time { font-size: 12px; color: rgba(255,255,255,0.4); }
    .post-text { color: rgba(255,255,255,0.85); line-height: 1.5; margin-bottom: 16px; }
    .post-stats { display: flex; gap: 20px; margin-bottom: 16px; }
    .post-stats span { cursor: pointer; color: rgba(255,255,255,0.5); transition: 0.2s; }
    .post-stats span:hover { color: #8b5cf6; }
    .comments-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .comment { margin-bottom: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 16px; }
    .comment-author { font-weight: 600; font-size: 13px; color: #c4b5fd; margin-bottom: 4px; }
    .comment-text { font-size: 13px; color: rgba(255,255,255,0.7); }
    .add-comment { display: flex; gap: 12px; margin-top: 12px; }
    .add-comment input { flex: 1; padding: 12px; border-radius: 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: white; font-family: 'Inter', sans-serif; }
    .add-comment input:focus { outline: none; border-color: #8b5cf6; }
    .empty-posts { text-align: center; padding: 60px; color: rgba(255,255,255,0.5); }
    
    .auth-buttons { display: flex; gap: 12px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6, #22d3ee); display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .logout-btn { padding: 8px 16px; font-size: 14px; }
    footer { border-top: 1px solid rgba(255,255,255,0.08); padding: 32px 0; margin-top: 60px; }
    .footer-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: rgba(255,255,255,0.55); text-decoration: none; cursor: pointer; }
    .toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; border: 1px solid rgba(34,211,238,0.5); border-radius: 16px; padding: 14px 24px; color: white; z-index: 1001; transform: translateX(400px); transition: 0.3s; backdrop-filter: blur(10px); }
    .toast.show { transform: translateX(0); }
    @media (max-width: 800px) { nav ul { display: none; } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
  <div id="toast" class="toast"></div>

  <header>
    <div class="container nav">
      <div class="logo" onclick="window.location.href='index.html'">
        <img src="logo.png" alt="Logo" class="logo-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%238b5cf6%22/><text x=%2250%22 y=%2272%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 font-weight=%22bold%22>WP</text></svg>'">
        <div><h1>well played</h1><p>find your perfect teammates</p></div>
      </div>
      <nav>
        <ul>
          <li><a href="games.html">Игры</a></li>
          <li><a href="teams.html">Команды</a></li>
          <li><a href="rating.html">Рейтинг</a></li>
          <li><a href="community.html" class="active">Сообщество</a></li>
        </ul>
      </nav>
      <div class="auth-buttons" id="authButtons">
        <button class="btn btn-secondary" onclick="openLoginModal()">Войти</button>
        <button class="btn btn-primary" onclick="openRegisterModal()">Регистрация</button>
      </div>
      <div class="user-info" id="userInfo" style="display: none;">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">User</span>
        <button class="btn btn-secondary logout-btn" onclick="logout()">Выйти</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1>Сообщество</h1>
    </div>

    <!-- Форма создания поста -->
    <div class="create-post" id="createPostForm" style="display: none;">
      <textarea id="postText" rows="3" placeholder="Поделитесь мыслями..."></textarea>
      <button class="btn btn-primary" onclick="createPost()">Опубликовать</button>
    </div>

    <!-- Список постов -->
    <div id="postsList"></div>
  </main>

  <footer>
    <div class="container footer-content">
      <div>© 2026 well played</div>
      <div class="footer-links">
        <a onclick="showToast('📢 Discord — скоро')">Discord</a>
        <a onclick="showToast('🎮 Steam — скоро')">Steam</a>
        <a onclick="showToast('📱 VK — скоро')">VK</a>
      </div>
    </div>
  </footer>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDBAZ2887ekcEGUcb9gTh2mwRLkrYDLqUE",
      authDomain: "well-played-app.firebaseapp.com",
      databaseURL: "https://well-played-app-default-rtdb.firebaseio.com",
      projectId: "well-played-app",
      storageBucket: "well-played-app.firebasestorage.app",
      messagingSenderId: "926709321013",
      appId: "1:926709321013:web:b90a53e2a4e0e9a228507c"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentUser = null;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    async function createPost() {
      if (!currentUser) {
        showToast('🔐 Войдите в аккаунт');
        openLoginModal();
        return;
      }
      const text = document.getElementById('postText').value.trim();
      if (!text) return;
      
      const userSnapshot = await database.ref('users/' + currentUser.uid).once('value');
      const userData = userSnapshot.val();
      
      await database.ref('posts').push({
        userId: currentUser.uid,
        userName: userData.username,
        text: text,
        timestamp: Date.now(),
        likes: 0,
        comments: {}
      });
      
      document.getElementById('postText').value = '';
      showToast('✅ Пост опубликован');
      renderPosts();
    }

    async function likePost(postId, likes) {
      if (!currentUser) {
        showToast('🔐 Войдите в аккаунт');
        openLoginModal();
        return;
      }
      await database.ref('posts/' + postId).update({ likes: likes + 1 });
    }

    async function addComment(postId) {
      if (!currentUser) {
        showToast('🔐 Войдите в аккаунт');
        openLoginModal();
        return;
      }
      const input = document.getElementById('comment_' + postId);
      const text = input.value.trim();
      if (!text) return;
      
      const userSnapshot = await database.ref('users/' + currentUser.uid).once('value');
      const userData = userSnapshot.val();
      
      const commentsRef = database.ref('posts/' + postId + '/comments');
      const snapshot = await commentsRef.once('value');
      const comments = snapshot.val() || {};
      const commentId = Date.now();
      comments[commentId] = {
        userId: currentUser.uid,
        userName: userData.username,
        text: text,
        timestamp: Date.now()
      };
      await commentsRef.set(comments);
      input.value = '';
      renderPosts();
    }

    async function renderPosts() {
      const postsList = document.getElementById('postsList');
      const snapshot = await database.ref('posts').once('value');
      const posts = snapshot.val();
      
      if (!posts) {
        postsList.innerHTML = '<div class="empty-posts">😢 Пока нет постов<br><button class="btn btn-primary" style="margin-top: 16px;" onclick="if(currentUser){document.getElementById(\'createPostForm\').scrollIntoView({behavior:\'smooth\'})}else{openLoginModal()}">Будь первым!</button></div>';
        return;
      }
      
      const postsArray = Object.entries(posts).map(([id, data]) => ({ id, ...data })).sort((a,b) => b.timestamp - a.timestamp);
      
      let html = '';
      for (const post of postsArray) {
        const comments = post.comments ? Object.values(post.comments).sort((a,b) => a.timestamp - b.timestamp) : [];
        
        html += `
          <div class="post-card">
            <div class="post-header">
              <div class="post-avatar">${escapeHtml(post.userName?.charAt(0) || 'U')}</div>
              <div>
                <div class="post-author">${escapeHtml(post.userName || 'Пользователь')}</div>
                <div class="post-time">${new Date(post.timestamp).toLocaleString()}</div>
              </div>
            </div>
            <div class="post-text">${escapeHtml(post.text)}</div>
            <div class="post-stats">
              <span onclick="likePost('${post.id}', ${post.likes || 0})">❤️ ${post.likes || 0}</span>
              <span>💬 ${comments.length}</span>
            </div>
            <div class="comments-section">
              ${comments.map(c => `
                <div class="comment">
                  <div class="comment-author">${escapeHtml(c.userName)}</div>
                  <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
              `).join('')}
              <div class="add-comment">
                <input type="text" id="comment_${post.id}" placeholder="Написать комментарий...">
                <button class="btn-secondary" style="padding: 12px 20px;" onclick="addComment('${post.id}')">→</button>
              </div>
            </div>
          </div>
        `;
      }
      postsList.innerHTML = html;
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // Auth UI
    function updateUIForLoggedInUser(user) {
      const authBtns = document.getElementById('authButtons');
      const userInfo = document.getElementById('userInfo');
      const userName = document.getElementById('userName');
      const userAvatar = document.getElementById('userAvatar');
      const createPostForm = document.getElementById('createPostForm');

      if (user) {
        authBtns.style.display = 'none';
        userInfo.style.display = 'flex';
        userName.textContent = user.displayName || user.email;
        userAvatar.textContent = (user.displayName || user.email).charAt(0).toUpperCase();
        createPostForm.style.display = 'block';
      } else {
        authBtns.style.display = 'flex';
        userInfo.style.display = 'none';
        createPostForm.style.display = 'none';
      }
    }

    function openLoginModal() { alert('Перейдите на главную страницу для входа'); }
    function openRegisterModal() { alert('Перейдите на главную страницу для регистрации'); }
    async function logout() { await auth.signOut(); showToast('👋 Вы вышли'); }

    auth.onAuthStateChanged(async (user) => {
      currentUser = user;
      updateUIForLoggedInUser(user);
      await renderPosts();
    });
    
    renderPosts();
  </script>
</body>
</html>
